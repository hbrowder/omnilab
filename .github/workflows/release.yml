name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write   # required to create GitHub Releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  Version: $VERSION"

      - name: Sanity-check VERSION file matches tag
        run: |
          FILE_VER="$(cat VERSION | tr -d '[:space:]')"
          TAG_VER="${{ steps.ver.outputs.version }}"
          if [ "$FILE_VER" != "$TAG_VER" ]; then
            echo "::error::VERSION file ($FILE_VER) does not match tag ($TAG_VER). Bump VERSION and re-tag."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps (for smoke test)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend import smoke test
        working-directory: backend
        run: python -c "import main; print('import OK')"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build .deb
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x packaging/build-deb.sh packaging/omnilab-cli
          packaging/build-deb.sh "$VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ steps.ver.outputs.tag }}$" | head -1 || true)
          {
            echo "## OmniLab ${{ steps.ver.outputs.tag }}"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since $PREV_TAG"
              git log --pretty=format:"- %s (%h)" "$PREV_TAG..${{ steps.ver.outputs.tag }}"
            else
              echo "### Initial release"
              git log --pretty=format:"- %s (%h)" -n 30
            fi
            echo
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "wget https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/omnilab_${{ steps.ver.outputs.version }}_amd64.deb"
            echo "sudo dpkg -i omnilab_${{ steps.ver.outputs.version }}_amd64.deb"
            echo '```'
          } > /tmp/CHANGELOG.md
          cat /tmp/CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: OmniLab ${{ steps.ver.outputs.tag }}
          body_path: /tmp/CHANGELOG.md
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: |
            dist/omnilab_${{ steps.ver.outputs.version }}_amd64.deb
            dist/omnilab_${{ steps.ver.outputs.version }}_amd64.deb.sha256

      # ---- Optional S3 mirror (skips silently if AWS secrets unset) ----
      - name: Mirror to S3 (optional)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          aws s3 cp dist/omnilab_${VERSION}_amd64.deb        s3://omnilab-releases/v${VERSION}/ --acl public-read
          aws s3 cp dist/omnilab_${VERSION}_amd64.deb.sha256 s3://omnilab-releases/v${VERSION}/ --acl public-read
          aws s3 cp dist/omnilab_${VERSION}_amd64.deb        s3://omnilab-releases/latest/omnilab_amd64.deb --acl public-read

      - name: Slack notification (optional)
        if: ${{ env.SLACK_WEBHOOK != '' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"🚀 OmniLab ${{ steps.ver.outputs.tag }} released: https://github.com/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.tag }}\"}" \
            "$SLACK_WEBHOOK"
